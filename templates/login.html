<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaTrave | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 520px; padding-top: 40px;">
        <header class="header">
            <div class="header-content">
                {% set brand_title = 'Acesso ao Sistema' %}
                {% set brand_subtitle = 'Entre com seu usuário e senha' %}
                {% include '_brand_header.html' %}
            </div>
        </header>

        <main class="main">
            {% if sucesso %}
                <div class="alert alert-success"><strong>✅</strong> {{ sucesso }}</div>
            {% endif %}
            {% if erro %}
                <div class="alert alert-warning"><strong>⚠️</strong> {{ erro }}</div>
            {% endif %}

            <section class="section">
                <h2 class="section-title">🔐 Login</h2>
                <form method="post" action="{{ url_for('jogador.login_submit') }}" class="form">
                    <div class="form-group">
                        <label class="form-label" for="username">Usuário</label>
                        <input class="form-input" id="username" name="username" type="text" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <input class="form-input" id="password" name="password" type="password" required autocomplete="current-password">
                    </div>
                    <button class="btn btn-primary" type="submit">Entrar</button>
                </form>

                <p style="margin-top: 12px; opacity: 0.9; font-size: 0.95rem;">
                    Não tem conta? <a href="{{ url_for('jogador.cadastro_page') }}" style="color: #7ee8fa; font-weight: 700;">Criar cadastro</a>
                </p>

                <p style="margin-top: 12px; opacity: 0.8; font-size: 0.9rem;">Admin padrão: <strong>admin</strong> / <strong>admin123</strong></p>
            </section>
        </main>
    </div>
</body>
</html>
