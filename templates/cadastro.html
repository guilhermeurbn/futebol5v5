<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaTrave | Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container" style="max-width: 560px; padding-top: 40px;">
        <header class="header">
            <div class="header-content">
                {% set brand_title = 'Criar Conta' %}
                {% set brand_subtitle = 'Faça seu próprio cadastro para acessar o sistema' %}
                {% include '_brand_header.html' %}
            </div>
        </header>

        <main class="main">
            {% if erro %}
                <div class="alert alert-warning"><strong>⚠️</strong> {{ erro }}</div>
            {% endif %}

            <section class="section">
                <h2 class="section-title">🆕 Cadastro de Usuário</h2>
                <form method="post" action="{{ url_for('jogador.cadastro_submit') }}" class="form">
                    <div class="form-group">
                        <label class="form-label" for="nome">Nome</label>
                        <input class="form-input" id="nome" name="nome" type="text" required minlength="2" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="username">Usuário</label>
                        <input class="form-input" id="username" name="username" type="text" required minlength="3" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Senha</label>
                        <input class="form-input" id="password" name="password" type="password" required minlength="6" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirmar_password">Confirmar senha</label>
                        <input class="form-input" id="confirmar_password" name="confirmar_password" type="password" required minlength="6" autocomplete="new-password">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="nivel">Nível do seu jogador (1-10)</label>
                        <input class="form-input" id="nivel" name="nivel" type="number" min="1" max="10" value="5" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="tipo">Tipo</label>
                        <select class="form-input" id="tipo" name="tipo">
                            <option value="avulso">avulso</option>
                            <option value="fixo">fixo</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="posicao">Posição</label>
                        <select class="form-input" id="posicao" name="posicao">
                            <option value="linha">linha</option>
                            <option value="goleiro">goleiro</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" type="submit">Criar conta</button>
                </form>

                <p style="margin-top: 12px; opacity: 0.9; font-size: 0.95rem;">
                    Já tem conta? <a href="{{ url_for('jogador.login_page') }}" style="color: #7ee8fa; font-weight: 700;">Entrar</a>
                </p>
            </section>
        </main>
    </div>
</body>
</html>
